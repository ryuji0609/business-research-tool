<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposal Pro | 提案文作成シート</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #0d47a1;
            --blue-light: #4facfe;
            --green: #06c755;
            --bg: #f0f4fd;
            --card: #ffffff;
            --text: #1a2b4c;
            --sub: #636e72;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(13, 71, 161, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: linear-gradient(135deg, #0d47a1, #1565c0);
            color: white;
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
        }

        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 0.02em;
        }

        .nav-sub {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 0.5rem;
            font-weight: 400;
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 100%;
        }

        @media(max-width:860px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        .card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: var(--blue);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--sub);
            margin-bottom: 0.3rem;
        }

        .label-hint {
            font-weight: 400;
            color: #a0aec0;
            font-size: 0.78rem;
        }

        input,
        textarea {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            font-size: 0.92rem;
            font-family: 'Noto Sans JP', sans-serif;
            transition: all 0.2s;
            background: #fafafa;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--blue-light);
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 71, 161, 0.25);
        }

        .btn-outline {
            background: transparent;
            color: var(--blue);
            border: 2px solid var(--blue);
            padding: 0.4rem 0.8rem;
            width: auto;
            font-size: 0.82rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: var(--blue);
            color: white;
        }

        /* Output */
        .output-area {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 400px;
            font-size: 0.92rem;
            line-height: 1.8;
            overflow-y: auto;
            max-height: 75vh;
            white-space: pre-wrap;
            flex: 1;
        }

        .output-area h2 {
            font-size: 1.1rem;
            color: var(--blue);
            margin: 1.2em 0 0.4em;
            font-weight: 700;
        }

        .output-area .section {
            margin-bottom: 1.5em;
        }

        .output-area .section-title {
            font-weight: 700;
            color: var(--blue);
            font-size: 0.95rem;
            border-left: 3px solid var(--blue-light);
            padding-left: 0.6rem;
            margin-bottom: 0.5em;
        }

        .output-area p {
            margin-bottom: 0.6em;
        }

        .output-area ul {
            margin-left: 1.3em;
            margin-bottom: 0.8em;
        }

        .output-area li {
            margin-bottom: 0.3em;
        }

        .output-area .highlight {
            background: rgba(79, 172, 254, 0.08);
            border-radius: 6px;
            padding: 0.8rem 1rem;
            margin: 0.8em 0;
            border-left: 3px solid var(--blue-light);
        }

        .placeholder {
            color: var(--sub);
            text-align: center;
            padding-top: 3rem;
        }

        .placeholder span {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }

        /* History */
        .history-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 1rem;
        }

        .history-chip {
            background: rgba(6, 199, 85, 0.08);
            border: 1px solid rgba(6, 199, 85, 0.25);
            color: #059644;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }

        .history-chip:hover {
            background: rgba(6, 199, 85, 0.15);
            transform: scale(1.03);
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-logo">🎯 Proposal Pro <span class="nav-sub">— 提案文メーカー</span></div>
    </nav>

    <div class="container">
        <!-- Input -->
        <div class="card">
            <h3>📝 プロジェクト情報</h3>

            <div id="history-area" class="history-chips"></div>

            <div class="form-group">
                <label>あなたの名前・屋号 <span class="label-hint">（提案書の差出人名）</span></label>
                <input type="text" id="my-name" placeholder="例: 山田 太郎 / マーケティングパートナー 山田">
            </div>
            <div class="form-group">
                <label>相手の会社名・担当者名</label>
                <input type="text" id="client-name" placeholder="例: 株式会社〇〇 田中様">
            </div>
            <div class="form-group">
                <label>相手の業種・ターゲット顧客</label>
                <input type="text" id="client-biz" placeholder="例: 美容室 / ターゲットは40代女性">
            </div>
            <div class="form-group">
                <label>相手の課題・依頼内容</label>
                <textarea id="client-problem" rows="3" placeholder="例: ホットペッパー依存の集客を脱却したい。自社でリストを取りたい。"></textarea>
            </div>
            <div class="form-group">
                <label>あなたのスキル・提供価値</label>
                <textarea id="my-skills" rows="3" placeholder="例: Lステップ構築、LPデザイン、SNS運用。マーケ目線でのデザインが得意。"></textarea>
            </div>
            <div class="form-group">
                <label>提案したい具体的な施策 <span class="label-hint">（複数OK）</span></label>
                <textarea id="my-plan" rows="3"
                    placeholder="例: ショート動画の作成→各媒体で認知拡大、LINE構築→受け皿作り、LP制作→リストイン強化"></textarea>
            </div>
            <div class="form-group">
                <label>その他アピールポイント <span class="label-hint">（任意）</span></label>
                <textarea id="extra" rows="2" placeholder="例: チームにデザイナー・セールスライター・動画クリエイターがいる。実績URL等。"></textarea>
            </div>

            <button class="btn" onclick="generate()">📄 提案書を生成</button>
        </div>

        <!-- Output -->
        <div class="card" style="display:flex; flex-direction:column;">
            <h3>
                <span>📄 提案書プレビュー</span>
                <div style="display:flex; gap:6px;">
                    <button class="btn-outline" onclick="copyText()">📋 コピー</button>
                    <button class="btn-outline" onclick="printProposal()">🖨 印刷</button>
                </div>
            </h3>
            <div id="output" class="output-area">
                <div class="placeholder">
                    <span>📝</span>
                    左側の情報を入力して「生成」ボタンを押すと、<br>
                    プロのクライアントワーク構成に沿った<br>
                    提案書が自動で組み上がります。<br><br>
                    <span style="font-size:0.85rem; color:var(--sub);">※ APIキー不要。すべてブラウザ内で完結します。</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== STORAGE =====
        const HISTORY_KEY = 'proposal_pro_history';
        function getHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
        function saveToHistory(data) {
            let h = getHistory();
            h.unshift({ ...data, createdAt: new Date().toISOString() });
            if (h.length > 10) h = h.slice(0, 10);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            const area = document.getElementById('history-area');
            const h = getHistory();
            if (!h.length) { area.innerHTML = ''; return; }
            area.innerHTML = '<span style="font-size:0.78rem; color:var(--sub); font-weight:600; align-self:center;">最近：</span>' +
                h.slice(0, 5).map((d, i) =>
                    `<div class="history-chip" onclick="loadHistory(${i})">🕐 ${d.clientName || d.clientBiz || '提案' + (i + 1)}</div>`
                ).join('');
        }

        function loadHistory(idx) {
            const d = getHistory()[idx];
            if (!d) return;
            document.getElementById('my-name').value = d.myName || '';
            document.getElementById('client-name').value = d.clientName || '';
            document.getElementById('client-biz').value = d.clientBiz || '';
            document.getElementById('client-problem').value = d.clientProblem || '';
            document.getElementById('my-skills').value = d.mySkills || '';
            document.getElementById('my-plan').value = d.myPlan || '';
            document.getElementById('extra').value = d.extra || '';
        }

        // ===== GENERATE =====
        function generate() {
            const myName = document.getElementById('my-name').value.trim();
            const clientName = document.getElementById('client-name').value.trim();
            const clientBiz = document.getElementById('client-biz').value.trim();
            const clientProblem = document.getElementById('client-problem').value.trim();
            const mySkills = document.getElementById('my-skills').value.trim();
            const myPlan = document.getElementById('my-plan').value.trim();
            const extra = document.getElementById('extra').value.trim();

            if (!clientBiz || !clientProblem || !mySkills || !myPlan) {
                alert("業種、課題、スキル、施策の4つは必須です。");
                return;
            }

            // Save
            saveToHistory({ myName, clientName, clientBiz, clientProblem, mySkills, myPlan, extra });

            // Build proposals items
            const plans = myPlan.split(/[、,\n]/).map(s => s.trim()).filter(Boolean);
            const skills = mySkills.split(/[、,\n]/).map(s => s.trim()).filter(Boolean);
            const today = new Date();
            const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

            const planItems = plans.map(p => {
                const parts = p.split(/[→⇒：:]/).map(s => s.trim());
                if (parts.length >= 2) {
                    return `<li><strong>${parts[0]}</strong><br>→ ${parts.slice(1).join(' → ')}</li>`;
                }
                return `<li>${p}</li>`;
            }).join('');

            const skillItems = skills.map(s => `<li>${s}</li>`).join('');

            const html = `
<div class="section">
  <h2>${clientName || '〇〇'} 様</h2>
  <p style="text-align:right; font-size:0.85rem; color:var(--sub);">${dateStr}</p>
  <p>はじめまして、${myName || '〇〇'}と申します。<br>
  何卒よろしくお願いいたします。</p>
  <p>私はマーケティング業務全般に携わっており、今回${clientName || '〇〇'}様の<strong>「${clientProblem.split(/[。\n]/)[0]}」</strong>に関して、ご提案をさせていただきます。</p>
</div>

<div class="section">
  <div class="section-title">【目的】</div>
  <p>${clientName || '〇〇'}様の<strong>認知拡大</strong>と<strong>売上の最大化</strong>を目的とし、${clientBiz}における最適なマーケティング戦略をご提案いたします。</p>
</div>

<div class="section">
  <div class="section-title">【現状の課題と所感】</div>
  <div class="highlight">
    <p>${clientProblem}</p>
  </div>
  <p>上記を踏まえた私の所感として、${clientBiz}の市場においては<strong>「お客様が御社を選ぶ明確な理由（コンセプト）」</strong>を言語化・可視化し、それを正しい導線で届けることが売上に直結すると考えております。</p>
  <p>現在の課題は、見込み客との接点やリスト獲得の仕組みが整っていない点にあると推察されますが、逆に言えば<strong>ここを整えるだけで大きなインパクトが見込めます。</strong></p>
</div>

<div class="section">
  <div class="section-title">【プロジェクト提案】</div>
  <p>以下の施策を順に実行することで、${clientName || '〇〇'}様の課題を解決してまいります。</p>
  <ul>${planItems}</ul>
</div>

<div class="section">
  <div class="section-title">【私の提供できる価値】</div>
  <ul>${skillItems}</ul>
  ${extra ? `<p>${extra}</p>` : ''}
  <p>必要に応じて、LP、Instagram、広告運用など<strong>売上最大化のために必要なコンテンツは追加でご提案・作成</strong>させていただきます。</p>
</div>

<div class="section">
  <div class="section-title">【スケジュール（目安）】</div>
  <ul>
    <li>ご契約後 → 第1回MTG（ヒアリング・方向性すり合わせ）</li>
    <li>1週間後 → 着手開始</li>
    <li>1ヶ月後 → 運用テスト・PDCA開始</li>
  </ul>
</div>

<div class="section">
  <div class="section-title">【最後に】</div>
  <p>${clientName || '〇〇'}様の事業内容を拝見し、<strong>非常に高い親和性を感じた</strong>からこそ、今回ご提案をさせていただきました。</p>
  <p>私の仕事は単なる制作代行ではなく、<strong>${clientName || '〇〇'}様のビジネスを「勝たせる」こと</strong>です。ぜひ二人三脚で売上アップを実現させてください。</p>
  <p>まずはお気軽にお声がけいただけますと幸いです。</p>
  <br>
  <p style="text-align:right;">${myName || '〇〇'}</p>
</div>`;

            document.getElementById('output').innerHTML = html;
            // store plain text for copy
            document.getElementById('output').dataset.raw = document.getElementById('output').innerText;
        }

        function copyText() {
            const raw = document.getElementById('output').innerText;
            if (!raw || raw.includes('左側の情報を入力して')) return alert("先に提案書を生成してください。");
            navigator.clipboard.writeText(raw).then(() => alert("コピーしました！")).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = raw;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                alert("コピーしました！");
            });
        }

        function printProposal() {
            const content = document.getElementById('output').innerHTML;
            if (content.includes('左側の情報を入力して')) return alert("先に提案書を生成してください。");
            const w = window.open('', '_blank');
            w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>提案書</title>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
      <style>
        body { font-family:'Noto Sans JP',sans-serif; padding:3rem; color:#1a2b4c; line-height:1.9; max-width:800px; margin:0 auto; }
        h2 { font-size:1.3rem; color:#0d47a1; border-bottom:2px solid #e2e8f0; padding-bottom:0.5rem; margin:1.5em 0 0.5em; }
        .section { margin-bottom:1.5em; }
        .section-title { font-weight:700; color:#0d47a1; font-size:1rem; border-left:3px solid #4facfe; padding-left:0.6rem; margin-bottom:0.5em; }
        .highlight { background:#f0f7ff; border-radius:6px; padding:0.8rem 1rem; margin:0.8em 0; border-left:3px solid #4facfe; }
        ul { margin-left:1.3em; } li { margin-bottom:0.3em; }
        @media print { body { padding:1rem; } }
      </style></head><body>${content}</body></html>`);
            w.document.close();
            setTimeout(() => w.print(), 400);
        }

        // Init
        renderHistory();
    </script>
</body>

</html>
